services:
  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  php:
    build:
      context: .
      dockerfile: Dockerfile.prod
    volumes:
      - ./storage:/var/www/html/storage
      - ./database:/var/www/html/database
    env_file:
      - path: .env
        required: false
    environment:
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY:-change-me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-escala-admin}
      DB_DRIVER: ${DB_DRIVER:-sqlite}
      DB_PATH: ${DB_PATH:-database/escala.sqlite}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-escala}
      DB_USER: ${DB_USER:-escala}
      DB_PASS: ${DB_PASS:-secret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(0);'"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: php tools/worker.php
    volumes:
      - ./storage:/var/www/html/storage
      - ./database:/var/www/html/database
    env_file:
      - path: .env
        required: false
    environment:
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_DRIVER: ${DB_DRIVER:-sqlite}
      DB_PATH: ${DB_PATH:-database/escala.sqlite}
      DB_HOST: ${DB_HOST:-db}
      DB_NAME: ${DB_NAME:-escala}
      DB_USER: ${DB_USER:-escala}
      DB_PASS: ${DB_PASS:-secret}
    restart: unless-stopped
    depends_on:
      - php

  # PostgreSQL opcional
  db:
    profiles: [postgres]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-escala}
      POSTGRES_USER: ${DB_USER:-escala}
      POSTGRES_PASSWORD: ${DB_PASS:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-escala} -d ${DB_NAME:-escala}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
