# Worker — cola de emails (servicio separado en Railway)
# Start Command: while true; do php tools/cron.php worker; sleep 60; done

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
startCommand = "while true; do php tools/cron.php worker; sleep 60; done"
restartPolicyType = "ON_FAILURE"
