# Railway — servicio worker (cola de emails/tareas)
# Crear un SEGUNDO servicio en el mismo proyecto y apuntar a este archivo
# o configurar Start Command: php tools/worker.php

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
startCommand = "php tools/worker.php"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
